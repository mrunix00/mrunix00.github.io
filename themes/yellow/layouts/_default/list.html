{{ partial "header.html" . }}

<div class="page">
  <div class="content-container">
  <section class="content">
    <header class="content-header">
{{ .Content }}

{{ range.Data.Pages }}
      <h3>
        <a href="{{ .RelPermalink }}" class="content-title">{{ .Title }}</a>
      </h3>
	    <time datetime="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">
		    {{ .Date.Format "January 2, 2006" }}
	    </time>
  </section>
  </div>
</div>
{{ end }}

{{ partial "footer.html" . }}
