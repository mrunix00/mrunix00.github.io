<div class="page">
    <header class="page-header">
        <h1 class="blog-title">
            <a class="title-text" href="{{ .Site.BaseURL }}">
                {{ .Site.Title }}
            </a>
        </h1>
        <ul class="menu">
            {{ range.Site.Menus.main }}
            <li class="menu-item">
                <a href="{{ .URL }}" class="menu-item_text">{{ .Name }}</a>
            </li>
            {{ end }}
        </ul>
    </header>
</div>
